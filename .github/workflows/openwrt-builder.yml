name: Build R3P 23.05 Badblock Compatible

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization Environment
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev libncursesw5-dev git wget unzip bzip2 python3 python3-pip

      - name: Download OpenWrt 23.05.3
        run: |
          git clone -b openwrt-23.05 https://github.com/openwrt/openwrt openwrt
          cd openwrt

      - name: Add Custom Feeds (SSR/AdGuardHome)
        run: |
          cd openwrt
          echo "src-git kenzo https://github.com/kenzok8/openwrt-packages" >> feeds.conf.default
          echo "src-git small https://github.com/kenzok8/small-package" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load R3P Custom Config (LZ4 Compression + Plugins)
        run: |
          cd openwrt
          cat > .config << EOF
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mi-router-3-pro=y
          CONFIG_DEVEL=y
          CONFIG_TOOLCHAIN_OPTIMIZATION_LEVEL_O2=y
          # 关键：改用LZ4低压缩内核，避免坏块解压失败
          CONFIG_KERNEL_GZIP=n
          CONFIG_KERNEL_LZ4=y
          # 预装插件
          CONFIG_PACKAGE_luci-app-ssr-plus=y
          CONFIG_PACKAGE_luci-app-adguardhome=y
          CONFIG_PACKAGE_luci-app-samba4=y
          CONFIG_PACKAGE_luci-i18n-adguardhome-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-ssr-plus-zh-cn=y
          EOF

      - name: Compile
        run: |
          cd openwrt
          make defconfig
          make download -j8
          make -j$(nproc) || make -j1 V=s

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-R3P-23.05-Build
          path: openwrt/bin/targets/ramips/mt7621/*.bin
