name: Build R3P 23.05 最终稳定版

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: 初始化环境
        run: |
          sudo apt update -y
          sudo apt install -y build-essential libncurses-dev git wget unzip

      - name: 下载 OpenWrt 23.05.3
        run: |
          git clone -b v23.05.3 https://github.com/openwrt/openwrt openwrt

      - name: 配置 R3P + 插件
        run: |
          cd openwrt
          cat > .config << EOF
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mi-router-3-pro=y
          CONFIG_KERNEL_GZIP=n
          CONFIG_KERNEL_LZ4=y
          CONFIG_PACKAGE_luci-app-wireguard=y
          CONFIG_PACKAGE_luci-app-adblock=y
          CONFIG_PACKAGE_luci-app-sqm=y
          EOF

      - name: 编译固件
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make download -j8
          make -j$(nproc) V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: R3P-OpenWrt-23.05
          path: openwrt/bin/targets/ramips/mt7621/*.bin
